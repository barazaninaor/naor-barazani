      function setLanguage(lang) {
        const t = translations[lang];
        document.documentElement.dir = t.dir;
        document.documentElement.lang = lang;
        document.title = t.pageTitle;

        // Header & Nav
        document
          .querySelectorAll(".lang-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.getElementById(`btn-${lang}`).classList.add("active");
        document.getElementById("nav-home").textContent = t.navHome;
        document.getElementById("nav-cover").textContent = t.navCover;
        document.getElementById("nav-home").href = `index.html?lang=${lang}`;
        document.getElementById("nav-cover").href =
          `coverletter.html?lang=${lang}`;
        document.getElementById("text-name").textContent = t.name;
        document.getElementById("text-tagline").textContent = t.tagline;
        document.getElementById("text-location").textContent = t.location;

        // Sections
        document.getElementById("title-profile").textContent = t.profileTitle;
        document.getElementById("text-profile-desc").textContent =
          t.profileDesc;
        document.getElementById("title-experience").textContent = t.expTitle;
        document.getElementById("title-education").textContent = t.eduTitle;
        document.getElementById("title-military").textContent = t.milTitle;
        document.getElementById("title-skills").textContent = t.skillsTitle;

        // Lists
        renderList("experience-list", experienceData[lang]);
        renderList("education-list", educationData[lang]);
        renderList("military-list", militaryData[lang]);

        // Skills
        document.getElementById("skills-list").innerHTML = skillsData[lang]
          .map((s) => `<li>${s}</li>`)
          .join("");
      }

      function renderList(id, data) {

          .map(

          <div class="experience-item">
            <div class="item-header"><strong>${item.title}</strong> <span>${item.date}</span></div>
            <ul>${item.bullets.map((b) => `<li>${b}</li>`).join("")}</ul>
          </div>
        `,
          )
          .join("");
      }
